name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game (default is com.dts.freefireth):"
        required: false
        default: "com.dts.freefireth"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle
    - name: Prepare and Build
      run: |
        chmod +x ./gradlew
        # Se for disparado manualmente com um pacote diferente, atualiza o game.h
        if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.package_name }}" ]; then
          sed -i "s/com.dts.freefireth/${{ github.event.inputs.package_name }}/g" module/src/main/cpp/game.h
        fi
        ./gradlew :module:assembleRelease
    - uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/magisk_module_release/
